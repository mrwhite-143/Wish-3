<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Wish Generator | Flame Vortex</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="custom-cursor"></div>

    <!-- Welcome Screen -->
    <div id="welcome-screen" class="container">
        <div class="gif-container">
            <img src="https://gifdb.com/images/high/mochi-mochi-peach-cat-gif-file-2202kb-53von6w05v0ekxmt.webp" alt="Welcome Cat">
        </div>
        <h1 class="title">Eid Wish Creator 🌙</h1>
        <p class="subtitle">Create a magic link for your special one!</p>
        <button class="main-btn" onclick="showInput()">Start Creating !</button>
    </div>

    <!-- Generator Screen -->
    <div id="input-screen" class="container" style="display: none; opacity: 0;">
        <h2 class="title">Customize the Wish</h2>
        
        <div class="input-box">
            <input type="text" id="userName" placeholder="Enter her/his name..." autocomplete="off">
        </div>

        <div class="gender-selection" style="margin-bottom: 20px;">
            <p style="color: #6a1b9a; font-weight: 600; margin-bottom: 10px;">Select Relation:</p>
            <label class="radio-label">
                <input type="radio" name="gender" value="girl" checked> <span>Princess (Girl)</span>
            </label>
            <label class="radio-label" style="margin-left: 15px;">
                <input type="radio" name="gender" value="boy"> <span>King (Boy)</span>
            </label>
        </div>

        <button class="main-btn" onclick="generateMagicLink()">Create Magic Link ✨</button>

        <!-- Link Result -->
        <div id="link-result" style="display: none; margin-top: 30px; padding: 15px; background: rgba(255,255,255,0.5); border-radius: 15px;">
            <p style="font-size: 0.9rem; color: #d63384;">Copy and send this link:</p>
            <input type="text" id="finalLink" readonly style="width: 100%; padding: 10px; border: 1px solid #ff4d6d; border-radius: 10px; text-align: center; margin: 10px 0;">
            <button class="main-btn" style="padding: 10px 20px; font-size: 1rem;" onclick="copyLink()">Copy Link 📋</button>
        </div>
    </div>

    <script src="style.js"></script>
</body>
</html>
